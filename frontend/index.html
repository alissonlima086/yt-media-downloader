<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>YT Media Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <header>
        <div class="logo">▶</div>
        <h1>YT Media Downloader</h1>
    </header>

    <div class="input-row">
        <input type="text" id="url" placeholder="Cole o link aqui..." autocomplete="off" spellcheck="false">
    </div>

    <!-- Single video preview -->
    <div class="video-preview" id="preview" style="display:none">
        <div class="thumb-wrap"><img id="preview-thumb" src="" alt=""></div>
        <div class="preview-info">
            <div class="preview-title" id="preview-title"></div>
            <div class="preview-meta">
                <span class="preview-duration" id="preview-duration"></span>
            </div>
        </div>
    </div>

    <!-- Playlist preview -->
    <div class="playlist-preview" id="playlist-preview" style="display:none">
        <div class="playlist-header">
            <div class="playlist-icon">☰</div>
            <div class="playlist-meta">
                <div class="playlist-title" id="playlist-title"></div>
                <div class="playlist-count" id="playlist-count"></div>
            </div>
        </div>
        <div class="playlist-tracks" id="playlist-tracks"></div>
    </div>

    <div class="preview-loading" id="preview-loading" style="display:none">
        <div class="spinner"></div>
        <span>Buscando informações...</span>
    </div>

    <!-- Mode toggle -->
    <div class="mode-toggle" id="mode-toggle" style="display:none">
        <button class="mode-btn active" id="btn-mode-audio" onclick="setMode('audio')">Áudio</button>
        <button class="mode-btn" id="btn-mode-video" onclick="setMode('video')">Vídeo</button>
    </div>

    <!-- Audio controls -->
    <div class="controls" id="controls-audio" style="display:none">
        <select id="audio-format">
            <option value="flac">FLAC</option>
            <option value="mp3">MP3</option>
            <option value="m4a">M4A</option>
            <option value="opus">OPUS</option>
        </select>
        <button id="btn-download" onclick="baixar()" disabled>Baixar</button>
    </div>

    <!-- Video controls -->
    <div class="controls" id="controls-video" style="display:none">
        <select id="video-quality">
            <option value="best">Melhor disponível</option>
        </select>
        <select id="video-format">
            <option value="mp4">MP4</option>
            <option value="mkv">MKV</option>
        </select>
        <button id="btn-download-video" onclick="baixar()" disabled>Baixar</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
        <div class="progress-track-info" id="progress-track-info" style="display:none"></div>
        <div class="progress-bar-row">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-label" id="progress-label">0%</div>
        </div>
    </div>

    <div class="status" id="status"></div>

    <footer class="footer">
        <a href="https://github.com/alissonlima086" target="_blank">
            github.com/alissonlima086
        </a>
    </footer>
</div>

<script>
const API = "http://localhost:8000";
let debounceTimer = null;
let mediaLoaded = false;
let currentMode = "audio";
let availableQualities = [];
let isPlaylist = false;
let playlistInfo = null;

const urlInput = document.getElementById("url");

urlInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    const val = urlInput.value.trim();
    if (!val) { resetPreview(); return; }
    debounceTimer = setTimeout(() => fetchInfo(val), 700);
});

function setMode(mode) {
    currentMode = mode;

    document.getElementById("btn-mode-audio").classList.toggle("active", mode === "audio");
    document.getElementById("btn-mode-video").classList.toggle("active", mode === "video");
    document.getElementById("controls-audio").style.display = mode === "audio" ? "flex" : "none";
    document.getElementById("controls-video").style.display = mode === "video" ? "flex" : "none";
}

function resetPreview() {
    mediaLoaded = false;
    isPlaylist = false;
    playlistInfo = null;
    document.getElementById("preview").style.display = "none";
    document.getElementById("playlist-preview").style.display = "none";
    document.getElementById("preview-loading").style.display = "none";
    document.getElementById("mode-toggle").style.display = "none";
    document.getElementById("controls-audio").style.display = "none";
    document.getElementById("controls-video").style.display = "none";
    document.getElementById("btn-download").disabled = true;
    document.getElementById("btn-download-video").disabled = true;
    setStatus("");
}

async function fetchInfo(url) {
    document.getElementById("preview").style.display = "none";
    document.getElementById("playlist-preview").style.display = "none";
    document.getElementById("preview-loading").style.display = "flex";
    document.getElementById("mode-toggle").style.display = "none";
    document.getElementById("btn-download").disabled = true;
    document.getElementById("btn-download-video").disabled = true;
    setStatus("");

    try {
        const res = await fetch(`${API}/info`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url })
        });

        document.getElementById("preview-loading").style.display = "none";

        if (!res.ok) { setStatus("Não foi possível carregar o conteúdo.", "error"); return; }

        const data = await res.json();

        if (data.type === "playlist") {
            renderPlaylistPreview(data);
        } else {
            renderVideoPreview(data);
        }

        mediaLoaded = true;
        document.getElementById("btn-download").disabled = false;
        document.getElementById("btn-download-video").disabled = false;
        document.getElementById("mode-toggle").style.display = "flex";
        setMode(currentMode);

    } catch {
        document.getElementById("preview-loading").style.display = "none";
        setStatus("Erro ao buscar informações.", "error");
    }
}

function renderVideoPreview(data) {
    isPlaylist = false;
    document.getElementById("preview-thumb").src = data.thumbnail;
    document.getElementById("preview-title").textContent = data.title;
    document.getElementById("preview-duration").textContent = data.duration;
    document.getElementById("preview").style.display = "flex";

    availableQualities = data.qualities || [];
    const qualSel = document.getElementById("video-quality");
    qualSel.innerHTML = '<option value="best">Melhor disponível</option>';
    availableQualities.forEach(q => {
        const opt = document.createElement("option");
        opt.value = q.format_id;
        opt.textContent = q.label;
        qualSel.appendChild(opt);
    });
}

function renderPlaylistPreview(data) {
    isPlaylist = true;
    playlistInfo = data;

    document.getElementById("playlist-title").textContent = data.playlist_title || "Playlist";
    document.getElementById("playlist-count").textContent = `${data.count} faixa${data.count !== 1 ? "s" : ""}`;

    const tracksEl = document.getElementById("playlist-tracks");
    tracksEl.innerHTML = "";

    const MAX_VISIBLE = 5;
    const entries = data.entries || [];

    entries.slice(0, MAX_VISIBLE).forEach((entry, i) => {
        tracksEl.appendChild(createTrackRow(i + 1, entry));
    });

    if (entries.length > MAX_VISIBLE) {
        const more = document.createElement("div");
        more.className = "playlist-more";
        more.textContent = `+ ${entries.length - MAX_VISIBLE} mais faixas`;
        tracksEl.appendChild(more);
    }

    document.getElementById("playlist-preview").style.display = "flex";

    // Playlist downloads don't support quality selection (always bestaudio/bestvideo)
    document.getElementById("video-quality").innerHTML = '<option value="best">Melhor disponível</option>';
}

function createTrackRow(index, entry) {
    const row = document.createElement("div");
    row.className = "track-row";

    const num = document.createElement("span");
    num.className = "track-num";
    num.textContent = String(index).padStart(2, "0");

    const info = document.createElement("div");
    info.className = "track-info";

    const title = document.createElement("span");
    title.className = "track-title";
    title.textContent = entry.title;

    const dur = document.createElement("span");
    dur.className = "track-duration";
    dur.textContent = entry.duration || "";

    info.appendChild(title);
    info.appendChild(dur);
    row.appendChild(num);
    row.appendChild(info);
    return row;
}

async function baixar() {
    if (!mediaLoaded) return;

    const url = urlInput.value.trim();
    let format, quality, mode;

    if (currentMode === "audio") {
        mode = "audio";
        format = document.getElementById("audio-format").value;
        quality = "bestaudio";
        document.getElementById("btn-download").disabled = true;
    } else {
        mode = "video";
        format = document.getElementById("video-format").value;
        quality = document.getElementById("video-quality").value;
        document.getElementById("btn-download-video").disabled = true;
    }

    const label = isPlaylist ? "playlist" : "mídia";
    setStatus(`Iniciando download... da ${label}`, "info");
    showProgress(0);

    if (isPlaylist) {
        document.getElementById("progress-track-info").style.display = "block";
        document.getElementById("progress-track-info").textContent = "Preparando...";
    }

    const response = await fetch(`${API}/download`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, mode, format, quality })
    });

    if (!response.ok) {
        setStatus("Erro ao iniciar o download.", "error");
        hideProgress();
        enableButtons();
        return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
                const event = JSON.parse(line.slice(6));

                if (event.type === "track_start") {
                    document.getElementById("progress-track-info").textContent =
                        `Faixa ${event.index} de ${event.total}`;
                    showProgress(0);
                    setStatus(`Baixando faixa ${event.index} de ${event.total}...`, "info");
                }

                if (event.type === "progress") {
                    showProgress(event.percent);
                    if (event.track_total) {
                        setStatus(`Faixa ${event.track_index}/${event.track_total} — ${Math.round(event.percent)}%`, "info");
                    } else {
                        setStatus(`Baixando... ${Math.round(event.percent)}%`, "info");
                    }
                }

                if (event.type === "done") {
                    const msg = event.is_playlist
                        ? `Playlist concluída! Baixando ZIP...`
                        : "Concluído!";
                    setStatus(msg, "success");
                    setTimeout(() => {
                        const a = document.createElement("a");
                        a.href = `${API}/file/${event.file_id}?filename=${encodeURIComponent(event.filename)}&format=${event.format}`;
                        a.download = event.filename;
                        a.click();
                        setTimeout(() => { hideProgress(); enableButtons(); }, 1500);
                    }, 300);
                }

                if (event.type === "error") {
                    setStatus(event.message, "error");
                    hideProgress();
                    document.getElementById("progress-track-info").style.display = "none";
                    enableButtons();
                }
            } catch {}
        }
    }
}

function enableButtons() {
    document.getElementById("btn-download").disabled = false;
    document.getElementById("btn-download-video").disabled = false;
}

function showProgress(percent) {
    document.getElementById("progress-wrap").style.display = "flex";
    document.getElementById("progress-fill").style.width = `${percent}%`;
    document.getElementById("progress-label").textContent = `${Math.round(percent)}%`;
}

function hideProgress() {
    setTimeout(() => {
        document.getElementById("progress-wrap").style.display = "none";
        document.getElementById("progress-track-info").style.display = "none";
    }, 800);
}

function setStatus(msg, type = "") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + type;
}
</script>

</body>
</html>
